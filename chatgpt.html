<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বাংলা বর্ণমালা Kids Learning</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    width:100vw;
    height:100vh;
    background:linear-gradient(135deg,#ffecd2,#fcb69f);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.app{
    width:95%;
    max-width:600px;
    height:95vh;
    background:linear-gradient(180deg,#ffffff,#f5f9ff);
    border-radius:30px;
    box-shadow:0 20px 60px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:20px;
    position:relative;
}

.header{
    text-align:center;
    font-size:22px;
    font-weight:800;
    color:#ff4d6d;
}

.card{
    flex:1;
    margin:15px 0;
    border-radius:25px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:0.6s;
    animation:pop 0.6s;
    text-align:center;
    padding:15px;
}

@keyframes pop{
    0%{transform:scale(0.5); opacity:0;}
    100%{transform:scale(1); opacity:1;}
}

.letter{
    font-size:22vw;
    font-weight:900;
    line-height:1;
}

.word{
    font-size:7vw;
    font-weight:700;
    margin-top:10px;
}

.emoji{
    font-size:12vw;
    margin-top:10px;
}

.controls{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
}

.btn{
    flex:1;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    border:none;
    padding:15px;
    font-size:22px;
    border-radius:20px;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    transition:0.3s;
}

.btn:active{
    transform:scale(0.95);
}

.footer{
    text-align:center;
    font-size:12px;
    color:#777;
}

/* Responsive */
@media (min-width:768px){
    .letter{font-size:180px;}
    .word{font-size:40px;}
    .emoji{font-size:90px;}
}
</style>
</head>

<body>

<div class="app">
    <div class="header">📚 বাংলা বর্ণমালা শেখা 😻</div>

    <div id="card" class="card">
        <div id="letter" class="letter">ক</div>
        <div id="word" class="word">কলা</div>
        <div id="emoji" class="emoji">🍌</div>
    </div>

    <div class="controls">
        <button class="btn" onclick="prev()">⬅️ আগের</button>
        <button class="btn" onclick="next()">পরের ➡️</button>
    </div>

    <div class="footer">Swipe 👉 বা Click করে পড়ো ✨</div>
</div>

<script>
const data = [
{l:"ক",w:"কলা",e:"🍌"},
{l:"খ",w:"খেজুর",e:"🌴"},
{l:"গ",w:"গরু",e:"🐄"},
{l:"ঘ",w:"ঘর",e:"🏠"},
{l:"ঙ",w:"ব্যাঙ",e:"🐸"},
{l:"চ",w:"চশমা",e:"👓"},
{l:"ছ",w:"ছাতা",e:"☂️"},
{l:"ঝ",w:"ঝড়",e:"🌪️"},
{l:"ঞ",w:"মিঞ",e:"🐭"},
{l:"ট",w:"টিয়া",e:"🦜"},
{l:"ঠ",w:"ঠোঁট",e:"👄"},
{l:"ড",w:"ডিম",e:"🥚"},
{l:"ঢ",w:"ঢোল",e:"🥁"},
{l:"ণ",w:"হরিণ",e:"🦌"},
{l:"ত",w:"তিমি",e:"🐋"},
{l:"থ",w:"থলে",e:"👜"},
{l:"দ",w:"দোয়েল",e:"🐦"},
{l:"ধ",w:"ধনুক",e:"🏹"},
{l:"প",w:"পাখি",e:"🐦"},
{l:"ফ",w:"ফুল",e:"🌸"},
{l:"ব",w:"বক",e:"🦢"},
{l:"ভ",w:"ভাল্লুক",e:"🐻"},
{l:"ম",w:"ময়ূর",e:"🦚"},
{l:"য",w:"যাঁতা",e:"⚙️"},
{l:"র",w:"রংধনু",e:"🌈"},
{l:"ল",w:"লাটিম",e:"🪀"},
{l:"শ",w:"শাপলা",e:"🌺"},
{l:"ষ",w:"ষাঁড়",e:"🐂"},
{l:"স",w:"সিংহ",e:"🦁"},
{l:"ড়",w:"বিড়াল",e:"🐱"},
{l:"ঢ়",w:"আষাঢ়",e:"🌧️"},
{l:"য়",w:"আয়না",e:"🪞"},
{l:"ৎ",w:"মৎস্য",e:"🐟"},
{l:"ং",w:"শিং",e:"🦏"},
{l:"ঃ",w:"দুঃখী",e:"😢"},
{l:"ঁ",w:"চাঁদ",e:"🌙"}
];

let index = 0;
const card = document.getElementById("card");
const letter = document.getElementById("letter");
const word = document.getElementById("word");
const emoji = document.getElementById("emoji");

const colors = [
"linear-gradient(135deg,#ff9a9e,#fad0c4)",
"linear-gradient(135deg,#a1c4fd,#c2e9fb)",
"linear-gradient(135deg,#fbc2eb,#a6c1ee)",
"linear-gradient(135deg,#fdcbf1,#e6dee9)",
"linear-gradient(135deg,#fddb92,#d1fdff)",
"linear-gradient(135deg,#89f7fe,#66a6ff)"
];

function render(){
    const d = data[index];
    letter.innerText = d.l;
    word.innerText = d.w;
    emoji.innerText = d.e;
    card.style.background = colors[index % colors.length];
    card.style.animation = "none";
    card.offsetHeight;
    card.style.animation = "pop 0.6s";
}

function next(){
    index = (index + 1) % data.length;
    render();
}

function prev(){
    index = (index - 1 + data.length) % data.length;
    render();
}

/* Swipe Support */
let startX = 0;
card.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
});
card.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX;
    if(endX - startX > 50){
        prev();
    }else if(startX - endX > 50){
        next();
    }
});

render();
</script>

</body>
</html>
